<div class="auth-page">
  <div class="auth-panel wf-card">
    <h2>Create Account</h2>
    <p>Set up your professional investing workspace.</p>

    <form [formGroup]="registerForm" (ngSubmit)="submit()" novalidate>
      <div class="mb-3">
        <label class="form-label" for="regName">Full Name</label>
        <input id="regName" type="text" class="form-control" formControlName="name" />
        <small class="text-danger" *ngIf="registerForm.controls.name.touched && registerForm.controls.name.invalid">
          Name must be at least 2 characters.
        </small>
      </div>

      <div class="mb-3">
        <label class="form-label" for="regEmail">Email</label>
        <input id="regEmail" type="email" class="form-control" formControlName="email" />
        <small class="text-danger" *ngIf="registerForm.controls.email.touched && registerForm.controls.email.invalid">
          Valid email is required.
        </small>
      </div>

      <div class="mb-3">
        <label class="form-label" for="regPassword">Password</label>
        <input id="regPassword" type="password" class="form-control" formControlName="password" />
        <small class="text-danger" *ngIf="registerForm.controls.password.touched && registerForm.controls.password.invalid">
          Password must be at least 6 characters.
        </small>
      </div>

      <div class="mb-3">
        <label class="form-label" for="regRole">Role</label>
        <select id="regRole" class="form-select" formControlName="role">
          <option *ngFor="let role of roles" [value]="role">{{ role }}</option>
        </select>
      </div>

      <button class="btn btn-emerald w-100" type="submit" [disabled]="submitting">
        {{ submitting ? 'Creating...' : 'Create Account' }}
      </button>
    </form>

    <div class="auth-link">
      Already registered?
      <a routerLink="/login">Sign in</a>
    </div>
  </div>
</div>
