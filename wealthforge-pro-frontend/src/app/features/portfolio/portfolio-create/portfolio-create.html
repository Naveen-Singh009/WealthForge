<section class="wf-card form-panel">
  <div class="wf-page-title mb-3">
    <div>
      <h2>Create Portfolio</h2>
      <p>Define a new investment container with opening balance.</p>
    </div>
  </div>

  <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
    <div class="mb-3">
      <label class="form-label" for="portfolioName">Portfolio Name</label>
      <input id="portfolioName" class="form-control" formControlName="name" />
      <small class="text-danger" *ngIf="form.controls.name.touched && form.controls.name.invalid">
        Name is required and must be at least 2 characters.
      </small>
    </div>

    <div class="mb-3">
      <label class="form-label" for="portfolioBalance">Initial Balance</label>
      <input id="portfolioBalance" type="number" class="form-control" formControlName="balance" />
      <small class="text-danger" *ngIf="form.controls.balance.touched && form.controls.balance.invalid">
        Balance must be zero or above.
      </small>
    </div>

    <div class="d-flex gap-2">
      <button class="btn btn-emerald" type="submit" [disabled]="submitting">
        {{ submitting ? 'Creating...' : 'Create Portfolio' }}
      </button>
      <a class="btn btn-outline-light" routerLink="/investor/portfolio">Cancel</a>
    </div>
  </form>
</section>
